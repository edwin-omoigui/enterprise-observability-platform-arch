replicaCount: 2

image:
  repository: sample-otel-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 8080

env:
  OTEL_SERVICE_NAME: sample-otel-app
  OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy.observability.svc.cluster.local:4318
  ENVIRONMENT: demo

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
